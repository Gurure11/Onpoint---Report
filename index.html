<script>

const SCRIPT_URL = "YOUR_SCRIPT_URL"; // paste your Apps Script Web App URL here

const form = document.getElementById("accidentForm");
const fileInput = document.getElementById("fileInput");
const progressFill = document.querySelector(".progress-fill");

let files = [];

fileInput?.addEventListener("change", function(e){
    files = e.target.files;
    previewImages(files);
});

function previewImages(files){

    const previewRow = document.createElement("div");
    previewRow.className = "image-preview-row";

    for(let file of files){

        const img = document.createElement("img");
        img.className = "preview-thumb";
        img.src = URL.createObjectURL(file);

        previewRow.appendChild(img);
    }

    fileInput.parentElement.appendChild(previewRow);
}

form.addEventListener("submit", async function(e){

    e.preventDefault();

    const btn = document.querySelector(".submit-btn");
    btn.disabled = true;
    btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Uploading report...";

    const formData = new FormData();

    formData.append("accidentDate", document.getElementById("accidentDate").value);
    formData.append("accidentTime", document.getElementById("accidentTime").value);
    formData.append("vehicleReg", document.getElementById("vehicleReg").value);
    formData.append("location", document.getElementById("location").value);
    formData.append("accidentType", document.getElementById("accidentType").value);
    formData.append("unitNumber", document.getElementById("unitNumber").value);
    formData.append("driverName", document.getElementById("driverName").value);
    formData.append("driverPhone", document.getElementById("driverPhone").value);

    if(files.length > 0){

        const reader = new FileReader();

        reader.onload = async function(){

            formData.append("photo", reader.result);

            await uploadToDrive(formData);
        }

        reader.readAsDataURL(files[0]);

    } else {

        await uploadToDrive(formData);

    }

});

async function uploadToDrive(formData){

    try{

        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: formData
        });

        const result = await response.text();

        document.querySelector(".report-card").innerHTML +=
        `<div class="success-message">
        <i class="fas fa-check-circle"></i>
        Accident report uploaded successfully
        </div>`;

    }catch(error){

        alert("Upload failed. Please try again.");

    }

}

</script>
